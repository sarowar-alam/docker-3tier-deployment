server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN"         always;
    add_header X-Content-Type-Options "nosniff"     always;
    # X-XSS-Protection removed: deprecated by all modern browsers and flagged
    # by OWASP as potentially exploitable (mode=block can be used to block pages).
    add_header Referrer-Policy "strict-origin"      always;

    # ── API reverse proxy ──
    # Forwards all /api/* requests to the backend container.
    # "backend" resolves via Docker's internal DNS on vitaltrack-net.
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Health check passthrough ──
    location /health {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── React SPA — client-side routing ──
    # try_files serves the real file if it exists (JS, CSS, images),
    # otherwise falls back to index.html so React Router handles the route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip compression ──
    gzip on;
    # gzip_vary sends 'Vary: Accept-Encoding' so CDNs and proxies cache
    # compressed and uncompressed versions separately — prevents corrupt responses.
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
}
